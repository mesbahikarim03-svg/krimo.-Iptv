name: IPTV AI Worker

on:
  workflow_dispatch:
    inputs:
      payload:
        description: 'Payload from Telegram Bot'
        required: false
        default: '{}'
  repository_dispatch:
    types: [run_worker]

jobs:
  run-bot-process:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyrogram tgcrypto nest_asyncio python-telegram-bot aiohttp requests

      - name: Run Worker Script
        env:
          MY_TELEGRAM_TOKEN: ${{ secrets.MY_TELEGRAM_TOKEN }}
          MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          MY_SESSION_STRING: ${{ secrets.MY_SESSION_STRING }}
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          PAYLOAD: ${{ github.event.client_payload.payload || github.event.inputs.payload || '{}' }}
        run: python worker.py
