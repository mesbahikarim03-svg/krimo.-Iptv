name: IPTV Heavy Worker

on:
  repository_dispatch:
    types: [run_bot_task]

concurrency:
  group: iptv-bot
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Packages
        run: pip install python-telegram-bot requests aiohttp pyrogram tgcrypto

      - name: Run Heavy Script
        env:
          MY_TELEGRAM_TOKEN: ${{ secrets.MY_TELEGRAM_TOKEN }}
          MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          MY_SESSION_STRING: ${{ secrets.MY_SESSION_STRING }}
          PAYLOAD: '${{ toJSON(github.event.client_payload) }}'
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python worker.py
